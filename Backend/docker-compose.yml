# Standalone deploy for the Backend server. No database service here —
# only Redis for Backend's own session/token cache (a dedicated Redis
# server per the deployment plan, same instance API/Central-Service's
# Redis usage would point at, distinguished by CACHE_PREFIX).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # nginx runs in a separate container/filesystem — share public/ so
      # it can serve static assets directly (see docker/entrypoint.sh).
      - public_shared:/var/www/html/public-shared

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8001:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - public_shared:/var/www/html/public-shared:ro

volumes:
  public_shared:
