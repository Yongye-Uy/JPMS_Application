server {
    listen 80;
    server_name _;
    index index.php;

    client_max_body_size 30M;

    # Static assets are served directly from a volume shared with the
    # php-fpm container (synced from its public/ on every boot — see
    # docker/entrypoint.sh), since nginx and php-fpm run in separate
    # containers with separate filesystems.
    root /var/www/html/public-shared;

    # Docker's embedded DNS resolver, used with a variable upstream below
    # so nginx re-resolves "app" per-request (subject to the TTL) instead
    # of once at config-load time — a static `fastcgi_pass app:9000` would
    # otherwise make nginx crash-loop forever if it starts a moment before
    # the app container's network alias is registered.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $upstream_app app;
        fastcgi_pass $upstream_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # Always the php-fpm container's OWN copy of index.php — that
        # container never mounts the shared static-asset volume above.
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
